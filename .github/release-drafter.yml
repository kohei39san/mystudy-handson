name-template: 'v$RESOLVED_VERSION ЁЯМИ'
tag-template: 'v$RESOLVED_VERSION'
commitish: refs/heads/main
filter-by-commitish: true
categories:
  - title: 'ЁЯЪА Features'
    labels:
      - 'feature'
  - title: 'ЁЯРЭ Bug Fixes'
    labels:
      - 'bug'
  - title: 'ЁЯФз Fixes'
    labels:
      - 'fix'
  - title: 'ЁЯз░ Maintenance'
    labels:
      - 'dependencies'
autolabeler:
  - label: 'feature'
    branch:
      - '/^feature\/.+/'
  - label: 'fix'
    branch:
      - '/^fix\/.+/'
  - label: 'bug'
    title:
      - '/(^|\s)(bug|уГРуВ░)(\s|$)/i'
    body:
      - '/(^|\s)(bug|уГРуВ░)(\s|$)/i'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'feature'
  patch:
    labels:
      - 'dependencies'
      - 'bug'
      - 'fix'
  default: patch
template: |
  ## Changes

  $CHANGES