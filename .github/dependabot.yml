updates:
- cooldown:
    default-days: 7
  directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions*"
  - dependency-name: "github/gh-aw-actions/**"
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  open-pull-requests-limit: 1000
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
    time: "18:00"
    timezone: Asia/Tokyo
  target-branch: main
- cooldown:
    semver-major-days: 30
    semver-minor-days: 14
    semver-patch-days: 7
  directories:
  - "**/*"
  groups:
    other-npm:
      patterns:
      - "*"
      update-types:
      - minor
      - patch
    other-npm-major:
      patterns:
      - "*"
      update-types:
      - major
    others:
      patterns:
      - "*"
  open-pull-requests-limit: 100
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
    time: "18:00"
    timezone: Asia/Tokyo
  target-branch: main
- cooldown:
    semver-major-days: 30
    semver-minor-days: 14
    semver-patch-days: 7
  directories:
  - "**/*"
  groups:
    all-pip:
      patterns:
      - "*"
      update-types:
      - minor
      - patch
    all-pip-major:
      patterns:
      - "*"
      update-types:
      - major
    others:
      patterns:
      - "*"
  open-pull-requests-limit: 100
  package-ecosystem: pip
  schedule:
    day: monday
    interval: weekly
    time: "18:00"
    timezone: Asia/Tokyo
  target-branch: main
- cooldown:
    default-days: 7
  directories:
  - "**/*"
  groups:
    other-providers:
      patterns:
      - "*"
      update-types:
      - minor
      - patch
    other-providers-major:
      patterns:
      - "*"
      update-types:
      - major
    others:
      patterns:
      - "*"
  open-pull-requests-limit: 100
  package-ecosystem: terraform
  schedule:
    day: monday
    interval: weekly
    time: "18:00"
    timezone: Asia/Tokyo
  target-branch: main
version: 2
