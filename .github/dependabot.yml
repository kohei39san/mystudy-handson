# Set update schedule for GitHub Actions

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "Asia/Tokyo"
    target-branch: main
    open-pull-requests-limit: 1000
    cooldown:
      default-days: 7
    ignore:
      # Exclude agentic workflow lock files (*.lock.yml) from version updates.
      # These files are auto-generated by `gh aw compile` and should not be modified by Dependabot.
      - dependency-name: "github/gh-aw-actions*"
  - package-ecosystem: "npm"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "Asia/Tokyo"
    target-branch: main
    open-pull-requests-limit: 10
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 14
      semver-major-days: 30
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
        update-types:
          - "minor"
          - "patch"
      aws-cdk:
        patterns:
          - "aws-cdk"
          - "aws-cdk-lib"
          - "constructs"
        update-types:
          - "minor"
          - "patch"
      aws-cdk-major:
        patterns:
          - "aws-cdk"
          - "aws-cdk-lib"
          - "constructs"
        update-types:
          - "major"
      other-npm:
        patterns:
          - "*"
        exclude-patterns:
          - "@aws-sdk/*"
          - "aws-cdk"
          - "aws-cdk-lib"
          - "constructs"
        update-types:
          - "minor"
          - "patch"
      other-npm-major:
        patterns:
          - "*"
        exclude-patterns:
          - "@aws-sdk/*"
          - "aws-cdk"
          - "aws-cdk-lib"
          - "constructs"
        update-types:
          - "major"
  - package-ecosystem: "pip"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "Asia/Tokyo"
    target-branch: main
    open-pull-requests-limit: 1000
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 14
      semver-major-days: 30
    groups:
      all-pip:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      all-pip-major:
        patterns:
          - "*"
        update-types:
          - "major"
  - package-ecosystem: terraform
    directories: 
      - "**/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "Asia/Tokyo"
    target-branch: main
    open-pull-requests-limit: 1000
    cooldown:
      default-days: 7
    groups:
      aws-provider:
        patterns:
          - "hashicorp/aws"
        update-types:
          - "minor"
          - "patch"
      aws-provider-major:
        patterns:
          - "hashicorp/aws"
        update-types:
          - "major"
      oci-provider:
        patterns:
          - "oracle/oci"
        update-types:
          - "minor"
          - "patch"
      oci-provider-major:
        patterns:
          - "oracle/oci"
        update-types:
          - "major"
      hashicorp-providers:
        patterns:
          - "hashicorp/http"
          - "hashicorp/null"
          - "hashicorp/random"
          - "hashicorp/local"
          - "hashicorp/tls"
          - "hashicorp/time"
        update-types:
          - "minor"
          - "patch"
      hashicorp-providers-major:
        patterns:
          - "hashicorp/http"
          - "hashicorp/null"
          - "hashicorp/random"
          - "hashicorp/local"
          - "hashicorp/tls"
          - "hashicorp/time"
        update-types:
          - "major"
      other-providers:
        patterns:
          - "*"
        exclude-patterns:
          - "hashicorp/aws"
          - "oracle/oci"
          - "hashicorp/http"
          - "hashicorp/null"
          - "hashicorp/random"
          - "hashicorp/local"
          - "hashicorp/tls"
          - "hashicorp/time"
        update-types:
          - "minor"
          - "patch"
      other-providers-major:
        patterns:
          - "*"
        exclude-patterns:
          - "hashicorp/aws"
          - "oracle/oci"
          - "hashicorp/http"
          - "hashicorp/null"
          - "hashicorp/random"
          - "hashicorp/local"
          - "hashicorp/tls"
          - "hashicorp/time"
        update-types:
          - "major"
