# Set update schedule for GitHub Actions

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "Asia/Tokyo"
    target-branch: main
    open-pull-requests-limit: 1000
    cooldown:
      default-days: 7
    ignore:
      # Exclude agentic workflow lock files (*.lock.yml) from version updates.
      # These files are auto-generated by `gh aw compile` and should not be modified by Dependabot.
      - dependency-name: "github/gh-aw-actions*"
  - package-ecosystem: "npm"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "Asia/Tokyo"
    target-branch: main
    open-pull-requests-limit: 100
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 14
      semver-major-days: 30
    groups:
      other-npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      other-npm-major:
        patterns:
          - "*"
        update-types:
          - "major"
      others:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "Asia/Tokyo"
    target-branch: main
    open-pull-requests-limit: 100
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 14
      semver-major-days: 30
    groups:
      all-pip:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      all-pip-major:
        patterns:
          - "*"
        update-types:
          - "major"
      others:
        patterns:
          - "*"
  - package-ecosystem: terraform
    directories: 
      - "**/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "Asia/Tokyo"
    target-branch: main
    open-pull-requests-limit: 100
    cooldown:
      default-days: 7
    groups:
      other-providers:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      other-providers-major:
        patterns:
          - "*"
        update-types:
          - "major"
      others:
        patterns:
          - "*"
