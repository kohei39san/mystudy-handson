name: npm Unit Test

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/npm-unit-test.yml"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/npm-unit-test.yml"

permissions:
  contents: read

jobs:
  npm-unit-test:
    name: npm Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
