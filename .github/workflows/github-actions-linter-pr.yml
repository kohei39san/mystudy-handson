name: GitHub Actions Linter

permissions:
  contents: write
  pull-requests: write

on:
  push:
    paths:
      - ".github/workflows/**"
      - "!.github/workflows/*.md"
      - "!.github/workflows/*.lock.yml"

jobs:
  lint:
    name: Lint GitHub Actions YAML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full git history is needed to get a proper list of changed files
          fetch-depth: 0

      - name: Lint GitHub Actions YAML Files
        uses: super-linter/super-linter@61abc07d755095a68f4987d1c2c3d1d64408f1f9 # v8.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SAVE_SUPER_LINTER_OUTPUT: false
          SAVE_SUPER_LINTER_SUMMARY: false
          ENABLE_GITHUB_ACTIONS_STEP_SUMMARY: false
          SUPER_LINTER_OUTPUT_DIRECTORY_NAME: super-linter-output
          # Only validate new or edited files
          VALIDATE_ALL_CODEBASE: false
          # Only validate YAML and GitHub Actions files
          VALIDATE_YAML_PRETTIER: true
          VALIDATE_GITHUB_ACTIONS: true
          # Filter for only GitHub Actions workflow files, excluding agentic workflow files
          FILTER_REGEX_INCLUDE: .*github/workflows/.*
          FILTER_REGEX_EXCLUDE: .*\.github/workflows/.*\.(md|lock\.yml)$
          # Fix issues automatically where possible
          FIX_YAML_PRETTIER: true

      - name: Check for changes
        if: ${{ !cancelled() }}
        id: git_diff
        run: |
          git add .
          git diff --cached --quiet && echo 'changes=' >> "$GITHUB_OUTPUT" || echo 'changes=changes' >> "$GITHUB_OUTPUT"

      - name: Get current branch name
        if: ${{ steps.git_diff.outputs.changes == 'changes' && !cancelled() }}
        id: get_branch
        run: |
          echo "branch_name=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: ${{ steps.git_diff.outputs.changes == 'changes' && !cancelled() }}
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          base: ${{ steps.get_branch.outputs.branch_name }}
          branch: githubactions-lint-pr-${{ steps.get_branch.outputs.branch_name }}
          title: "Changes by githubactions-lint-pr actions"
          labels: fix
