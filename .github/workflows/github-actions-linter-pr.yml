name: GitHub Actions Linter

permissions:
  contents: write

on:
  push:
    branches-ignore:
      - main
    paths:
      - ".github/workflows/**"
      - "!.github/workflows/*.md"
      - "!.github/workflows/*.lock.yml"

jobs:
  lint:
    name: Lint GitHub Actions YAML Files
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full git history is needed to get a proper list of changed files
          fetch-depth: 0

      - name: Lint GitHub Actions YAML Files
        uses: super-linter/super-linter@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SAVE_SUPER_LINTER_OUTPUT: false
          SAVE_SUPER_LINTER_SUMMARY: false
          ENABLE_GITHUB_ACTIONS_STEP_SUMMARY: false
          SUPER_LINTER_OUTPUT_DIRECTORY_NAME: super-linter-output
          # Only validate new or edited files
          VALIDATE_ALL_CODEBASE: false
          # Only validate YAML and GitHub Actions files
          VALIDATE_YAML_PRETTIER: true
          VALIDATE_GITHUB_ACTIONS: true
          # Filter for only GitHub Actions workflow files, excluding agentic workflow files
          FILTER_REGEX_INCLUDE: .*github/workflows/.*
          FILTER_REGEX_EXCLUDE: .*\.github/workflows/.*\.(md|lock\.yml)$
          # Fix issues automatically where possible
          FIX_YAML_PRETTIER: true

      - name: Check for changes
        if: ${{ !cancelled() }}
        id: git_diff
        run: |
          git add .
          git diff --cached --quiet && echo 'changes=' >> "$GITHUB_OUTPUT" || echo 'changes=changes' >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: ${{ steps.git_diff.outputs.changes == 'changes' && !cancelled() }}
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Changes by githubactions-lint actions"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}
          git push origin HEAD
