name: Pinact Action

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "!.github/workflows/*.md"

jobs:
  pinact:
    name: Check GitHub Actions are pinned to commit hashes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check GitHub Actions are pinned
        uses: suzuki-shunsuke/pinact-action@fd95c7317488e35c8e642cb7bf51edbf5dbb5ce4 # v3.10.0
        with:
          skip_push: "false"
          app_id: ${{secrets.APP_ID}}
          app_private_key: ${{secrets.APP_PRIVATE_KEY}}
          branch_to_tags: "^main$"