name: Ansible Linter

permissions:
  contents: write

on:
  push:
    branches-ignore:
      - main
    paths:
      - "**/ansible/**"

jobs:
  lint:
    name: Lint Ansible Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r .github/requirements.yml -p ./collections --force

      - name: Run ansible-lint
        uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c # v26.4.0
        # optional (see below):
        with:
          args: "--fix **/ansible/"
          setup_python: "true"
          working_directory: ""
          requirements_file: ".github/requirements.yml"

      - name: Check for changes
        if: ${{ !cancelled() }}
        id: git_diff
        run: |
          git add .
          git diff --cached --quiet && echo 'changes=' >> "$GITHUB_OUTPUT" || echo 'changes=changes' >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: ${{ steps.git_diff.outputs.changes == 'changes' && !cancelled() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Changes by ansible-lint actions"
          git push origin HEAD
